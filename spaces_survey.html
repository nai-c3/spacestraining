<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spaces Schulung – Dein Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #2D3FE0; --yellow: #F5C842;
  --bg: #F0F0FC; --surface: #FFFFFF;
  --border: rgba(45,63,224,0.12);
  --text: #0D1440; --muted: #6B72A8;
  --cond: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; padding-bottom: 60px; }

header { background: var(--blue); height: 10px; }

.name-section { padding: 24px; background: var(--surface); border-bottom: 1.5px solid var(--border); }
.field-label { font-family: var(--cond); font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; display: block; }
.name-section input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: var(--cond); font-size: 20px; font-weight: 700; color: var(--text); outline: none; transition: border-color 0.2s; }
.name-section input:focus { border-color: var(--blue); }
.name-section input::placeholder { color: var(--muted); font-weight: 400; }

.q-item { background: var(--surface); padding: 22px 24px; border-bottom: 1.5px solid var(--border); }
.q-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
.q-num { font-family: var(--cond); font-size: 11px; font-weight: 700; color: var(--yellow); background: var(--blue); padding: 2px 7px; border-radius: 3px; letter-spacing: 0.08em; flex-shrink: 0; }
.q-title { font-family: var(--cond); font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text); }

/* GRADIENT SLIDER */
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 6px;
  border-radius: 3px; outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--blue) 0%, #c0bef5 50%, var(--yellow) 100%);
  margin-bottom: 10px;
  display: block;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%;
  background: #fff; border: 3px solid var(--blue);
  box-shadow: 0 2px 10px rgba(45,63,224,0.25); cursor: pointer; transition: transform 0.1s;
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.15); }

.poles { display: flex; justify-content: space-between; }
.pole { font-family: var(--cond); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); max-width: 45%; line-height: 1.3; }
.pole.right { text-align: right; }

.submit-area { padding: 28px 24px 0; }
button#submit-btn { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 18px; font-family: var(--cond); font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
button#submit-btn:active { transform: scale(0.98); }
button#submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.status { margin-top: 14px; font-family: var(--cond); font-size: 13px; text-align: center; color: var(--muted); min-height: 20px; text-transform: uppercase; letter-spacing: 0.08em; }

.success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 40px 24px; text-align: center; }
.checkmark { width: 72px; height: 72px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; color: var(--yellow); font-size: 32px; font-weight: 900; }
.success-screen h2 { font-family: var(--cond); font-size: 40px; font-weight: 900; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
.success-screen p { font-family: var(--cond); font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>

<div id="main-form">
  <header></header>

  <div class="name-section">
    <label class="field-label">Dein Name</label>
    <input type="text" id="name-input" placeholder="Vorname reicht" autocomplete="off">
  </div>

  <div id="questions"></div>

  <div class="submit-area">
    <button id="submit-btn" onclick="submitData()">Abschicken →</button>
    <div class="status" id="status"></div>
  </div>
</div>

<div class="success-screen" id="success-screen">
  <div class="checkmark">✓</div>
  <h2>Danke!</h2>
  <p>Dein Profil wurde gespeichert.<br>Das Dashboard zeigt gleich alle Ergebnisse.</p>
</div>

<script>
const QUESTIONS = [
  { num:'01', title:'KI-Skill allgemein',   left:'Kompletter Neuling',  right:'KI-Expertin / Experte' },
  { num:'02', title:'Nutzung pro Tag',       left:'Kaum / nie',          right:'Stundenlang täglich' },
  { num:'03', title:'Hype-O-Meter',          left:'Tiefer Skeptiker',    right:'Totaler Fan' },
  { num:'04', title:'Bild-KI-Erfahrung',     left:'Noch nie genutzt',    right:'Täglich im Einsatz' },
  { num:'05', title:'Video-KI-Erfahrung',    left:'Noch nie genutzt',    right:'Täglich im Einsatz' },
  { num:'06', title:'Audio-KI-Erfahrung',    left:'Noch nie genutzt',    right:'Täglich im Einsatz' },
  { num:'07', title:'Prompting-Skill',       left:'Was ist ein Prompt?', right:'Prompt-Profi' },
  { num:'08', title:'Lernbereitschaft',      left:'Muss mich zwingen',   right:'Mega motiviert' },
  { num:'09', title:'KI im Joballtag',       left:'Kein Einsatz',        right:'Unverzichtbar' },
  { num:'10', title:'Magnific-Skill',        left:'Noch nie gehört',     right:'Spaces-Profi' },
];

const vals = new Array(10).fill(0);
const qc = document.getElementById('questions');

QUESTIONS.forEach((q,i) => {
  qc.innerHTML += `<div class="q-item">
    <div class="q-meta">
      <span class="q-num">${q.num}</span>
      <span class="q-title">${q.title}</span>
    </div>
    <input type="range" min="-10" max="10" value="0" step="1"
      oninput="vals[${i}]=parseInt(this.value)">
    <div class="poles">
      <span class="pole">${q.left}</span>
      <span class="pole right">${q.right}</span>
    </div>
  </div>`;
});

const params = new URLSearchParams(window.location.search);
const API_KEY = params.get('k') || '';
const BIN_ID  = params.get('b') || '';

async function submitData() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { setStatus('Bitte deinen Namen eingeben.'); return; }
  if (!API_KEY || !BIN_ID) { setStatus('Kein API-Key — bitte Trainer fragen.'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; setStatus('Wird gespeichert…');
  try {
    const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    const existing = await getRes.json();
    const entries = existing.record?.entries || [];
    entries.push({ name, values: vals, ts: Date.now() });
    const putRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body: JSON.stringify({entries})
    });
    if (!putRes.ok) throw new Error('Fehler beim Speichern');
    document.getElementById('main-form').style.display = 'none';
    document.getElementById('success-screen').style.display = 'flex';
  } catch(e) { btn.disabled=false; setStatus('Fehler: '+e.message); }
}
function setStatus(m) { document.getElementById('status').textContent = m; }
</script>
</body>
</html>
